name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: rathole-pro-x86_64-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: rathole-pro-x86_64-windows.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            name: rathole-pro-x86_64-macos

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/rathole-pro ${{ matrix.name }} && chmod +x ${{ matrix.name }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/rathole-pro.exe ${{ matrix.name }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: mkdir release && find artifacts -type f -exec cp {} release/ \;
      - uses: softprops/action-gh-release@v2
        with:
          name: "RatholePro ${{ github.ref_name }}"
          body: |
            ## RatholePro ${{ github.ref_name }}
            **Developer:** iPmart Network (Ali Hassanzadeh)
            
            ### Features
            - TCP + UDP forwarding with multiplexing
            - WebSocket transport (firewall bypass)
            - Load Balancing (round_robin, random, least_conn)
            - HTTP/HTTPS Proxy (CONNECT tunnel)
            - P2P NAT traversal (STUN/hole punch)
            - IPv6 support
            - `--gen-key` keypair generator
            - `--validate` config checker
            
            ### Install
            ```bash
            bash <(curl -Ls https://raw.githubusercontent.com/iPmartNetwork/RatholePro/master/install.sh)
            ```
          files: release/*
          fail_on_unmatched_files: false
