name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: rathole-pro-linux-amd64
          - goos: linux
            goarch: arm64
            name: rathole-pro-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            name: rathole-pro-linux-armv7
          - goos: linux
            goarch: mips64
            name: rathole-pro-linux-mips64
          - goos: linux
            goarch: mips
            name: rathole-pro-linux-mips
          - goos: windows
            goarch: amd64
            name: rathole-pro-windows-amd64.exe
          - goos: darwin
            goarch: amd64
            name: rathole-pro-darwin-amd64
          - goos: darwin
            goarch: arm64
            name: rathole-pro-darwin-arm64

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        working-directory: go-core
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o ../${{ matrix.name }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: mkdir release && find artifacts -type f -exec cp {} release/ \;

      - uses: softprops/action-gh-release@v2
        with:
          name: "RatholePro ${{ github.ref_name }}"
          body: |
            ## RatholePro ${{ github.ref_name }} (Go + Yamux)
            **Developer:** iPmart Network (Ali Hassanzadeh)
            
            ### Features
            - Real yamux multiplexing (single TCP, many streams)
            - Transport: TCP, TLS (auto-cert), Noise, WebSocket (RFC 6455)
            - TCP + UDP forwarding
            - Load Balancing, HTTP Proxy, P2P STUN
            - Heartbeat + auto-reconnect
            
            ### Install
            ```bash
            bash <(curl -Ls https://raw.githubusercontent.com/iPmartNetwork/RatholePro/master/install.sh)
            ```
          files: release/*
          fail_on_unmatched_files: false
