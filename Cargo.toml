[package]
name = "rathole-pro"
version = "0.1.0"
edition = "2021"
authors = ["iPmart Network (Ali Hassanzadeh)"]
description = "RatholePro — Next-generation high-performance reverse proxy tunnel with built-in multiplexing, multi-transport (TCP/TLS/Noise/WS/WSS/QUIC), UDP forwarding, load balancing, P2P NAT traversal, and HTTP proxy support. Designed for speed, security, and simplicity."
license = "Apache-2.0"
repository = "https://github.com/iPmartNetwork/RatholePro"
homepage = "https://github.com/iPmartNetwork/RatholePro"

[features]
default = ["transport-tls", "transport-noise", "transport-ws"]
all-transports = ["transport-tls", "transport-noise", "transport-ws", "transport-quic"]
transport-tls = ["dep:tokio-rustls", "dep:rustls", "dep:rustls-pemfile", "dep:webpki-roots"]
transport-noise = ["dep:snow"]
transport-ws = ["dep:tokio-tungstenite"]
transport-quic = ["dep:quinn", "dep:rustls", "dep:rustls-pemfile", "dep:webpki-roots"]

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
bytes = "1"
uuid = { version = "1", features = ["v4"] }
sha2 = "0.10"
hex = "0.4"
futures = "0.3"
base64 = "0.22"

# Optional transports
tokio-rustls = { version = "0.26", optional = true }
rustls = { version = "0.23", optional = true }
rustls-pemfile = { version = "2", optional = true }
webpki-roots = { version = "0.26", optional = true }
tokio-tungstenite = { version = "0.21", features = ["rustls-tls-webpki-roots"], optional = true }
snow = { version = "0.9", optional = true }
quinn = { version = "0.11", optional = true }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
