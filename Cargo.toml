[package]
name = "rathole-pro"
version = "0.1.0"
edition = "2021"
authors = ["iPmart Network (Ali Hassanzadeh)"]
description = "RatholePro — Next-generation high-performance reverse proxy tunnel with built-in multiplexing, multi-transport (TCP/TLS/Noise/WS/WSS/QUIC), UDP forwarding, load balancing, P2P NAT traversal, and HTTP proxy support. Designed for speed, security, and simplicity."
license = "Apache-2.0"
repository = "https://github.com/iPmartNetwork/RatholePro"
homepage = "https://github.com/iPmartNetwork/RatholePro"

[dependencies]
tokio = { version = "1.38", features = ["full"] }
tokio-util = { version = "0.7", features = ["codec"] }
tokio-rustls = "0.26"
rustls = "0.23"
rustls-pemfile = "2.1"
webpki-roots = "0.26"
tokio-tungstenite = { version = "0.23", features = ["rustls-tls-webpki-roots"] }
quinn = "0.11"
snow = "0.9"
serde = { version = "1.0", features = ["derive"] }
toml = "0.8"
clap = { version = "4.5", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1.0"
bytes = "1.6"
uuid = { version = "1.8", features = ["v4"] }
sha2 = "0.10"
hex = "0.4"
futures = "0.3"
serde_json = "1.0"
base64 = "0.22"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
